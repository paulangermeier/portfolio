{% extends "base.html" %}

{% block content %}

<div class="detail-content">
    <div>
        <nav class="breadcrumb">
            <ol>
                <li><a href="{{ url_for('index') }}">Paul Angermeier</a></li>
                <li><a href="{{ url_for('projects') }}">Projektübersicht</a></li>
                <li><span>{{ project['title'] }}</span></li>
            </ol>
        </nav>
    </div>
    <div>
        <div>
            <h1>{{ project['title'] }}</h1>
        </div>
        <div class="detail-image">
            <img src="{{ url_for('static', filename=project['image_path']) }}">
        </div>
        <div>
            <p>{{ project['long_description'] }}</p>
        </div>
    </div>
</div>

{% endblock %}
